name: Black Eyepatch Monitor

on:
  schedule:
    - cron: '*/1 * * * *'  # Every 30 minutes
  workflow_dispatch:         # Allows manual trigger from the Actions tab

# Needed so the action can commit known_products.json back to the repo
permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Use a PAT so the commit can trigger future workflows if needed
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run monitor
        env:
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:       ${{ secrets.NOTIFY_EMAIL }}
        run: python bep_monitor.py
      - name: Commit updated known_products.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add known_products.json
          # Only commit if the file actually changed
          git diff --cached --quiet || git commit -m "chore: update known products [skip ci]"
          git push
